<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบบจัดการข้อมูล McCoil</title>
  <!-- ใช้ CDN ที่เสถียรที่สุด -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #f3f2f1; padding: 10px; font-size: 14px; }
    .container { max-width: 100%; margin: 0 auto; background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #212121; margin-bottom: 15px; font-size: 20px; font-weight: 600; }
    .top-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
    select, button { padding: 10px 12px; border: none; border-radius: 6px; font-size: 14px; }
    select { border: 1px solid #d0d7de; background: white; flex: 1; min-width: 120px; }
    button { cursor: pointer; font-weight: 500; white-space: nowrap; }
    .btn-add { background: #107c41; color: white; }
    .btn-scan { background: #107c41; color: white; }
    .btn-cam { background: #7a2f9e; color: white; }
    .btn-save { background: #2b579a; color: white; }
    .btn-move { background: #c55a11; color: white; }
    .btn-clear { background: #7a7a7a; color: white; }
    #reader, #cameraPreview { width: 100%; max-width: 450px; margin: 12px auto; display: none; border-radius: 8px; overflow: hidden; border: 1px solid #d0d7de; background: #000; }
    #cameraPreview video { width: 100%; transform: scaleX(-1); }
    .cam-ctrl { text-align: center; padding: 10px; background: #f8f9fa; display: flex; gap: 10px; justify-content: center; }
    .cam-ctrl button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .cam-ctrl .ok { background: #107c41; color: white; }
    .cam-ctrl .close { background: #a8201a; color: white; }
    .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 12px 0; border: 1px solid #d0d7de; border-radius: 6px; }
    table { min-width: 720px; width: 100%; border-collapse: collapse; background: white; }
    th, td { border: 1px solid #d0d7de; padding: 10px 6px; text-align: center; vertical-align: middle; }
    th { background: #f2f2f2; color: #212121; font-weight: 600; font-size: 13px; }
    td input { width: 96%; padding: 8px; border: none; outline: none; text-align: center; font-size: 14px; background: transparent; }
    td input:focus { border: 1px solid #2b579a; background: #eaf1fb; border-radius: 4px; }
    .readonly { background: #f8f9fa; color: #333; }
    .readonly input { background: transparent; color: #333; cursor: default; }
    .edit-sloc { background: #fff2cc; }
    .msg { margin: 12px 0; padding: 10px; border-radius: 6px; text-align: center; display: none; font-size: 14px; }
    .success { background: #dff6dd; color: #107c41; border: 1px solid #c8e6c9; }
    .error { background: #fde7e9; color: #a8201a; border: 1px solid #f8cbcd; }
    .info { background: #fcf4d6; color: #835c00; border: 1px solid #fbeba8; }
  </style>
</head>
<body>
<div class="container">
  <h2>📦 ระบบจัดการข้อมูล McCoil</h2>
  <div class="top-bar">
    <select id="srcSheet">
      <option value="McCoilAll">จาก: McCoilAll</option>
      <option value="McCoilin">จาก: McCoilin</option>
      <option value="McCoilCut">จาก: McCoilCut</option>
    </select>
    <button class="btn-add" onclick="manualAddRow()">➕ เพิ่มแถว</button>
    <button class="btn-scan" onclick="startScan()">📷 สแกนบาร์โค้ด</button>
    <button class="btn-cam" onclick="startCamera()">🖼️ ถ่ายรูปเพิ่มรายการ</button>
  </div>
  <div id="reader"></div>
  <div id="cameraPreview">
    <video id="camVideo" autoplay playsinline muted></video>
    <div class="cam-ctrl">
      <button class="ok" onclick="captureImage()">📸 ถ่ายและประมวลผล</button>
      <button class="close" onclick="stopCamera()">❌ ปิดกล้อง</button>
    </div>
  </div>
  <div id="msgBox" class="msg"></div>
  <div class="table-wrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th width="16%">BatchNo (ค้นหา A)</th>
          <th width="16%">SLOC (แก้ไขได้)</th>
          <th width="16%">Size</th>
          <th width="16%">Weight</th>
          <th width="18%">Inspection (ค้นหา F)</th>
          <th width="18%">Maker</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="top-bar" style="justify-content: center;">
    <button class="btn-save" onclick="updateAllSLOC()">💾 อัปเดตข้อมูล</button>
    <button class="btn-move" onclick="moveAllToCut()">✂️ ตัดไป McCoilCut</button>
    <button class="btn-clear" onclick="clearTable()">🗑️ ล้างตาราง</button>
  </div>
</div>

<script>
const CONFIG = {
  tenantId: "b52d417f-633c-4f6a-9374-27ea1d65846e",
  clientId: "edad237d-7561-41ba-96f2-0c9802c746b9",
  fileId: "IQCwdd9a2VbXTZXs2qyL_D2cAS0nal1ti-0gVBfY6je0ySg"
};

let accessToken = "";
let scannerObj = null;
let cameraStream = null;
let rowDataList = [];
let excelRowRef = [];
let isProcessing = false;

async function getAccessToken() {
  if (accessToken) return;
  accessToken = prompt("กรุณาใส่ Access Token ที่ได้รับ:");
}

function manualAddRow() {
  rowDataList.push({ batch: "", sloc: "", size: "", weight: "", insp: "", maker: "", srcSheet: "", excelRow: -1 });
  excelRowRef.push(-1);
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = rowDataList.map((item, idx) => `
    <tr>
      <td><input type="text" id="batch-${idx}" value="${item.batch}" onkeydown="handleEnter(event, ${idx}, 'batch')"></td>
      <td class="edit-sloc"><input type="text" id="sloc-${idx}" value="${item.sloc}"></td>
      <td class="readonly"><input type="text" id="size-${idx}" value="${item.size}" readonly></td>
      <td class="readonly"><input type="text" id="weight-${idx}" value="${item.weight}" readonly></td>
      <td><input type="text" id="insp-${idx}" value="${item.insp}" onkeydown="handleEnter(event, ${idx}, 'insp')"></td>
      <td class="readonly"><input type="text" id="maker-${idx}" value="${item.maker}" readonly></td>
    </tr>
  `).join("");
}

async function handleEnter(event, idx, field) {
  if (event.key === "Enter" || event.keyCode === 13) {
    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();
    if (isProcessing) return;
    isProcessing = true;
    try {
      if (field === "batch") await searchByBatch(idx);
      else if (field === "insp") await searchByInsp(idx);
      manualAddRow();
      const newIdx = rowDataList.length - 1;
      setTimeout(() => document.getElementById(`${field}-${newIdx}`)?.focus(), 50);
    } catch (err) {
      showMsg("เกิดข้อผิดพลาด: " + err.message, "error");
    } finally { isProcessing = false; }
  }
}

async function searchByBatch(idx) {
  await getAccessToken();
  const batchVal = document.getElementById(`batch-${idx}`).value.trim();
  const sheet = document.getElementById("srcSheet").value;
  if (!batchVal) return;
  await fetchAndFillData(idx, sheet, "A", batchVal);
}

async function searchByInsp(idx) {
  await getAccessToken();
  const inspVal = document.getElementById(`insp-${idx}`).value.trim();
  const sheet = document.getElementById("srcSheet").value;
  if (!inspVal) return;
  await fetchAndFillData(idx, sheet, "F", inspVal);
}

async function fetchAndFillData(idx, sheet, colSearch, keyword) {
  showMsg("กำลังค้นหาข้อมูล...", "info");
  try {
    const res = await fetch(`https://graph.microsoft.com/v1.0/drives/bccthailand/items/${CONFIG.fileId}/workbook/worksheets/${sheet}/usedRange`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await res.json();
    if (!data.values) throw new Error("ไม่สามารถอ่านข้อมูลจากไฟล์ได้");
    let foundRow = null, rowNum = -1;
    const colIdx = colSearch === "A" ? 0 : 5;
    for (let i = 0; i < data.values.length; i++) {
      const cellVal = data.values[i][colIdx]?.toString().trim();
      if (cellVal === keyword) { foundRow = data.values[i]; rowNum = i + 1; break; }
    }
    if (!foundRow) return showMsg(`ไม่พบข้อมูล: ${keyword}`, "error");
    rowDataList[idx] = { batch: foundRow[0] ?? "", sloc: foundRow[7] ?? "", size: foundRow[3] ?? "", weight: foundRow[4] ?? "", insp: foundRow[5] ?? "", maker: foundRow[6] ?? "", srcSheet: sheet, excelRow: rowNum };
    excelRowRef[idx] = rowNum;
    renderTable();
    showMsg("ดึงข้อมูลสำเร็จ", "success");
  } catch (err) { showMsg("ผิดพลาด: " + err.message, "error"); }
}

// ✅ ปรับปรุงการเรียกกล้องให้รองรับทุกกรณี
async function startScan() {
  stopAll();
  document.getElementById("reader").style.display = "block";
  try {
    // ตรวจสอบความสามารถของเบราว์เซอร์ก่อน
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error("เบราว์เซอร์ไม่รองรับการเข้าถึงกล้อง");
    }
    // ขอสิทธิ์กล้องอย่างชัดเจน
    await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } });
    scannerObj = new Html5Qrcode("reader");
    await scannerObj.start(
      { facingMode: "environment" }, { fps: 15, qrbox: { width: 280, height: 150 } },
      async text => {
        stopScan();
        if (rowDataList.length === 0) manualAddRow();
        const lastIdx = rowDataList.length - 1;
        document.getElementById(`batch-${lastIdx}`).value = text.trim();
        await handleEnter({preventDefault:()=>{}, stopPropagation:()=>{}, stopImmediatePropagation:()=>{}}, lastIdx, 'batch');
      }, err => { console.log("สแกน:", err); }
    );
  } catch (err) {
    showMsg(`เปิดสแกนไม่ได้: ${err.message} | วิธีแก้: เปิดผ่านลิงก์ https:// เท่านั้น`, "error");
    document.getElementById("reader").style.display = "none";
  }
}
function stopScan() { if (scannerObj) scannerObj.stop().catch(()=>{}); document.getElementById("reader").style.display = "none"; }

async function startCamera() {
  stopAll();
  document.getElementById("cameraPreview").style.display = "block";
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error("ไม่รองรับกล้อง");
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } });
    document.getElementById("camVideo").srcObject = cameraStream;
  } catch (err) {
    showMsg(`เปิดกล้องไม่ได้: ${err.message}`, "error");
    document.getElementById("cameraPreview").style.display = "none";
  }
}
function stopCamera() { if (cameraStream) cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; document.getElementById("cameraPreview").style.display = "none"; }

async function captureImage() {
  showMsg("กำลังวิเคราะห์ข้อความ...", "info");
  const video = document.getElementById("camVideo");
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  stopCamera();
  try {
    const result = await Tesseract.recognize(canvas, "tha+eng", { logger: m => console.log(m) });
    const lines = result.data.text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 3);
    lines.forEach(txt => { manualAddRow(); const lastIdx = rowDataList.length - 1; document.getElementById(`batch-${lastIdx}`).value = txt; searchByBatch(lastIdx); });
    manualAddRow();
    setTimeout(() => document.getElementById(`batch-${rowDataList.length - 1}`)?.focus(), 50);
  } catch { showMsg("อ่านข้อความไม่สำเร็จ", "error"); }
}

function stopAll() { stopScan(); stopCamera(); }

async function updateAllSLOC() {
  if (rowDataList.length === 0) return showMsg("ไม่มีข้อมูลที่จะบันทึก", "error");
  await getAccessToken();
  showMsg("กำลังบันทึกข้อมูลกลับไฟล์...", "info");
  try {
    for (let i = 0; i < rowDataList.length; i++) {
      if (excelRowRef[i] < 1) continue;
      const newInsp = document.getElementById(`insp-${i}`).value.trim();
      const newSloc = document.getElementById(`sloc-${i}`).value.trim();
      await fetch(`https://graph.microsoft.com/v1.0/drives/bccthailand/items/${CONFIG.fileId}/workbook/worksheets/McCoilAll/range(address='F${excelRowRef[i]}')`, { method: "PATCH", headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" }, body: JSON.stringify({ values: [[newInsp]] }) });
      await fetch(`https://graph.microsoft.com/v1.0/drives/bccthailand/items/${CONFIG.fileId}/workbook/worksheets/McCoilAll/range(address='H${excelRowRef[i]}')`, { method: "PATCH", headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" }, body: JSON.stringify({ values: [[newSloc]] }) });
    }
    showMsg("บันทึกข้อมูลเรียบร้อยแล้ว", "success");
  } catch (err) { showMsg("ผิดพลาด: " + err.message, "error"); }
}

async function moveAllToCut() {
  if (rowDataList.length === 0) return showMsg("ไม่มีข้อมูลที่จะย้าย", "error");
  await getAccessToken();
  showMsg("กำลังย้ายข้อมูล...", "info");
  try {
    for (let i = 0; i < rowDataList.length; i++) {
      const item = rowDataList[i];
      if (excelRowRef[i] < 1) continue;
      const newInsp = document.getElementById(`insp-${i}`).value.trim();
      const newSloc = document.getElementById(`sloc-${i}`).value.trim();
      const newRowData = [item.batch, "", "", item.size, item.weight, newInsp, item.maker, newSloc];
      await fetch(`https://graph.microsoft.com/v1.0/drives/bccthailand/items/${CONFIG.fileId}/workbook/worksheets/McCoilCut/rows/add`, { method: "POST", headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" }, body: JSON.stringify({ values: [newRowData] }) });
      await fetch(`https://graph.microsoft.com/v1.0/drives/bccthailand/items/${CONFIG.fileId}/workbook/worksheets/${item.srcSheet}/range(address='A${item.excelRow}:H${item.excelRow}')`, { method: "DELETE", headers: { Authorization: `Bearer ${accessToken}` } });
    }
    showMsg("ย้ายข้อมูลสำเร็จ", "success");
    clearTable();
  } catch (err) { showMsg("ผิดพลาด: " + err.message, "error"); }
}

function clearTable() { if (!confirm("ยืนยันการล้างข้อมูลทั้งหมด?")) return; rowDataList = []; excelRowRef = []; manualAddRow(); showMsg("ล้างข้อมูลเรียบร้อย", "success"); }
function showMsg(text, type) { const msgBox = document.getElementById("msgBox"); msgBox.style.display = "block"; msgBox.className = `msg ${type}`; msgBox.innerText = text; setTimeout(() => msgBox.style.display = "none", 4000); }

manualAddRow();
</script>
</body>
</html>
