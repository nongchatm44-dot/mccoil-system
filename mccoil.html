<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการCoil Mc Cr</title>
    <!-- นำเข้าไลบรารี SheetJS สำหรับแปลงข้อมูลเป็น Excel -->
    <script src="https://jsdelivr.net"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        /* ส่วนหัวข้อระบบ */
        .header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #eef2f5;
            margin-bottom: 25px;
            color: #1e293b;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        /* โซนนำเข้าข้อมูลด่วนด้านบน */
        .top-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* ช่องรับบาร์โค้ด */
        .input-zone {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* โซนตารางที่เลื่อนซ้ายขวาได้ */
        .table-responsive {
            width: 100%;
            overflow-x: auto; /* เปิดให้เลื่อนซ้ายขวาเมื่อจอเล็ก */
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            white-space: nowrap; /* ห้ามตัดคำ เพื่อให้เห็นข้อมูลเต็มช่องคอลัมน์ */
        }

        th, td {
            padding: 14px 18px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 15px;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .summary-text {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* โซนปุ่มคำสั่งด้านล่าง */
        .bottom-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        /* ปุ่มต่างๆ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* สีปุ่มเฉพาะกิจ */
        .btn-photo { background-color: #2563eb; } /* น้ำเงิน */
        .btn-scan { background-color: #10b981; }  /* เขียว */
        .btn-add { background-color: #475569; }   /* เทาเข้ม */
        
        .btn-sloc { background-color: #f59e0b; }  /* ส้ม */
        .btn-cut { background-color: #d97706; }   /* ส้มเข้ม */
        .btn-clear { background-color: #ef4444; } /* แดง */
        
        .btn-export { 
            background-color: #15803d; 
            grid-column: span 3; /* ยืดเต็มความกว้างด้านล่างสุด */
            margin-top: 5px;
        }

        .btn-delete {
            background-color: #fee2e2;
            color: #ef4444;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
        }
        .btn-delete:hover { background-color: #fca5a5; color: white; }

        /* ปรับแต่งสำหรับหน้าจอมือถือ */
        @media (max-width: 600px) {
            .top-actions, .bottom-actions {
                grid-template-columns: 1fr;
            }
            .btn-export {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ส่วนหัวข้อระบบ -->
    <div class="header">
        <h1>📊 ระบบจัดการCoil Mc Cr</h1>
    </div>

    <!-- โซนนำเข้าข้อมูลด่วนด้านบน -->
    <div class="top-actions">
        <button class="btn btn-photo" onclick="triggerAction('ถ่ายรูป')">📷 ถ่ายรูป</button>
        <button class="btn btn-scan" onclick="triggerAction('สแกน')">🔍 สแกน</button>
    </div>

    <!-- ช่องกรอกข้อมูลด่วน / ยิงบาร์โค้ด -->
    <div class="input-zone">
        <label for="barcodeInput" style="font-weight: 600; color: #475569; font-size: 14px;">กรอกข้อมูลแถวใหม่ (หรือยิงบาร์โค้ดแล้วกด Enter):</label>
        <div class="input-group">
            <input type="text" id="barcodeInput" placeholder="พิมพ์ข้อมูลที่นี่ แล้วกด Enter..." autocomplete="off">
            <button class="btn btn-add" onclick="addRowFromInput()">เพิ่มแถว</button>
        </div>
    </div>

    <!-- โซนตารางข้อมูลขยายเต็มตัวอักษร เลื่อนซ้ายขวาได้ -->
    <div class="table-responsive">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Batch No</th>
                    <th>Sloc</th>
                    <th>Size</th>
                    <th>Weight</th>
                    <th>Maker</th>
                    <th>Inspection</th>
                    <th style="text-align: center;">จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <!-- ข้อมูลตัวอย่างเริ่มต้น สามารถแก้ไขหรือลบออกได้ -->
                <tr>
                    <td><input type="text" value="BT-2026-001" style="border:none; background:transparent; font-size:15px; width:100%;"></td>
                    <td><input type="text" value="S01" style="border:none; background:transparent; font-size:15px; width:100%;"></td>
                    <td><input type="text" value="1200mm" style="border:none; background:transparent; font-size:15px; width:100%;"></td>
                    <td><input type="text" value="2.5" style="border:none; background:transparent; font-size:15px; width:100%;"></td>
                    <td><input type="text" value="Maker-A" style="border:none; background:transparent; font-size:15px; width:100%;"></td>
                    <td><input type="text" value="Pass" style="border:none; background:transparent; font-size:15px; width:100%;"></td>
                    <td style="text-align: center;"><button class="btn btn-delete" onclick="deleteRow(this)">ลบ</button></td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="summary-text" id="rowCountText">📊 สรุปรายการ: ทั้งหมด 1 แถว</div>

    <!-- โซนปุ่มคำสั่งด้านล่าง -->
    <div class="bottom-actions">
        <button class="btn btn-sloc" onclick="triggerAction('ย้าย Sloc')">🔄 ย้าย Sloc</button>
        <button class="btn btn-cut" onclick="triggerAction('ตัด')">✂️ ตัด</button>
        <button class="btn btn-clear" onclick="clearAllData()">🧹 ล้างข้อมูล</button>
        
        <button class="btn btn-export" onclick="exportToExcel()">📥 ดาวน์โหลดไฟล์ Excel (Export)</button>
    </div>
</div>

<script>
    const barcodeInput = document.getElementById('barcodeInput');
    const dataTableBody = document.querySelector('#dataTable tbody');

    // ดักจับเหตุการณ์เมื่อกดปุ่ม Enter ในช่องกรอกข้อมูลด่วน
    barcodeInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            addRowFromInput();
        }
    });

    // ฟังก์ชันเพิ่มแถวใหม่ลงในตาราง
    function addRowFromInput() {
        const value = barcodeInput.value.trim();
        if (value === '') return;

        // ในขั้นตอนนี้ ระบบจะนำค่าที่สแกนใส่เข้าช่อง Batch No เป็นค่าตั้งต้น (คุณสามารถปรับตรรกะการแยกคำ/ตัวคั่นได้ในอนาคต)
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" value="${value}" style="border:none; background:transparent; font-size:15px; width:100%;"></td>
            <td><input type="text" value="" style="border:none; background:transparent; font-size:15px; width:100%;"></td>
            <td><input type="text" value="" style="border:none; background:transparent; font-size:15px; width:100%;"></td>
            <td><input type="text" value="" style="border:none; background:transparent; font-size:15px; width:100%;"></td>
            <td><input type="text" value="" style="border:none; background:transparent; font-size:15px; width:100%;"></td>
            <td><input type="text" value="" style="border:none; background:transparent; font-size:15px; width:100%;"></td>
            <td style="text-align: center;"><button class="btn btn-delete" onclick="deleteRow(this)">ลบ</button></td>
        `;
        
        dataTableBody.appendChild(tr);
        barcodeInput.value = ''; // ล้างช่องค้นหาเพื่อสแกนรายการต่อไป
        barcodeInput.focus();   // ให้ cursor กลับมาโฟกัสช่องเติมข้อมูลเสมอ
        updateRowCount();
    }

    // ฟังก์ชันลบแถวที่เลือก
    function deleteRow(button) {
