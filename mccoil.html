<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการCoil Mc Cr</title>
    <!-- นำเข้าไลบรารี SheetJS สำหรับแปลงข้อมูลเป็น Excel -->
    <script src="https://jsdelivr.net"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 10px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: #ffffff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        /* ส่วนหัวข้อระบบ */
        .header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #eef2f5;
            margin-bottom: 20px;
            color: #1e293b;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
        }

        /* โซนนำเข้าข้อมูลด่วนด้านบน */
        .top-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        /* ช่องรับบาร์โค้ด */
        .input-zone {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            width: 100%;
        }

        .input-group input:focus {
            border-color: #3b82f6;
        }

        /* โซนตารางที่จะเกิด scrollbar แนวนอนเมื่อจอล้น */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #ffffff;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 16px;
            border: 1px solid #cbd5e1; /* ปรับเส้นตารางเข้มขึ้นเล็กน้อยเพื่อให้เห็นขอบข่ายช่องชัดเจนแบบ Excel */
            font-size: 14px;
            white-space: nowrap; /* ห้ามตัดบรรทัดเด็ดขาด เพื่อให้คอลัมน์กว้างพอดีข้อมูลยาวๆ */
        }

        /* กำหนดขนาดขั้นต่ำเพื่อรองรับตัวอย่างข้อมูลยาวพิเศษของคุณ */
        th:nth-child(1), td:nth-child(1) { min-width: 160px; } /* Batch No */
        th:nth-child(2), td:nth-child(2) { min-width: 90px;  } /* Sloc */
        th:nth-child(3), td:nth-child(3) { min-width: 140px; } /* Size */
        th:nth-child(4), td:nth-child(4) { min-width: 100px; } /* Weight */
        th:nth-child(5), td:nth-child(5) { min-width: 120px; } /* Maker */
        th:nth-child(6), td:nth-child(6) { min-width: 140px; } /* Inspection */

        th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }

        /* สไตล์เมื่อคลิกพิมพ์แก้ไขในเซลล์ */
        td[contenteditable="true"]:focus {
            outline: 2px solid #2563eb;
            background-color: #eff6ff;
        }

        .summary-text {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* โซนปุ่มคำสั่งด้านล่าง */
        .bottom-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* ปุ่มคำสั่ง */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-photo { background-color: #2563eb; } 
        .btn-scan { background-color: #10b981; }  
        .btn-add { background-color: #475569; width: auto; }   
        
        .btn-sloc { background-color: #f59e0b; }  
        .btn-cut { background-color: #d97706; }   
        .btn-clear { background-color: #ef4444; } 
        .btn-export { background-color: #15803d; }

        .btn-delete {
            background-color: #fee2e2;
            color: #ef4444;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            width: auto;
        }
        
        @media (min-width: 768px) {
            body { padding: 20px; }
            .container { max-width: 1200px; padding: 25px; }
            .header h1 { font-size: 24px; }
            .bottom-actions { grid-template-columns: repeat(3, 1fr); }
            .btn-export { grid-column: span 3; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 ระบบจัดการCoil Mc Cr</h1>
    </div>

    <div class="top-actions">
        <button class="btn btn-photo" onclick="triggerAction('ถ่ายรูป')">📷 ถ่ายรูป</button>
        <button class="btn btn-scan" onclick="triggerAction('สแกน')">🔍 สแกน</button>
    </div>

    <div class="input-zone">
        <label for="barcodeInput" style="font-weight: 600; color: #475569; font-size: 14px;">กรอกข้อมูลแถวใหม่ (หรือยิงบาร์โค้ดแล้วกด Enter):</label>
        <div class="input-group">
            <input type="text" id="barcodeInput" placeholder="ตัวอย่าง: RN999999999999,AC01,0.99*1999*C,10000,Aungeang,B99999999999" autocomplete="off">
            <button class="btn btn-add" onclick="addRowFromInput()">เพิ่มแถว</button>
        </div>
    </div>

    <div class="table-responsive">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Batch No</th>
                    <th>Sloc</th>
                    <th>Size</th>
                    <th>Weight</th>
                    <th>Maker</th>
                    <th>Inspection</th>
                    <th style="text-align: center; min-width: 70px;">จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <!-- ข้อมูลตัวอย่างเริ่มต้นตามรูปแบบที่คุณต้องการ -->
                <tr>
                    <td contenteditable="true">RN999999999999</td>
                    <td contenteditable="true">AC01</td>
                    <td contenteditable="true">0.99*1999*C</td>
                    <td contenteditable="true">10000</td>
                    <td contenteditable="true">Aungeang</td>
                    <td contenteditable="true">B99999999999</td>
                    <td style="text-align: center;"><button class="btn btn-delete" onclick="deleteRow(this)">ลบ</button></td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="summary-text" id="rowCountText">📊 สรุปรายการ: ทั้งหมด 1 แถว</div>

    <div class="bottom-actions">
        <button class="btn btn-sloc" onclick="triggerAction('ย้าย Sloc')">🔄 ย้าย Sloc</button>
        <button class="btn btn-cut" onclick="triggerAction('ตัด')">✂️ ตัด</button>
        <button class="btn btn-clear" onclick="clearAllData()">🧹 ล้างข้อมูล</button>
        <button class="btn btn-export" onclick="exportToExcel()">📥 ดาวน์โหลดไฟล์ Excel (Export)</button>
    </div>
</div>

<script>
    const barcodeInput = document.getElementById('barcodeInput');
    const dataTableBody = document.querySelector('#dataTable tbody');

    barcodeInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            addRowFromInput();
        }
    });

    function addRowFromInput() {
        const value = barcodeInput.value.trim();
        if (value === '') return;

        // แยกข้อมูลด้วยเครื่องหมายจุลภาค (,)
        const items = value.split(',');
        
        // เตรียมข้อมูลให้ครบ 6 ช่อง (ถ้าพิมพ์มาไม่ครบ จะปล่อยให้เป็นช่องว่างแทน)
        const batchNo = items[0] ? items[0].trim() : '';
        const sloc = items[1] ? items[1].trim() : '';
        const size = items[2] ? items[2].trim() : '';
        const weight = items[3] ? items[3].trim() : '';
        const maker = items[4] ? items[4].trim() : '';
        const inspection = items[5] ? items[5].trim() : '';

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td contenteditable="true">${batchNo}</td>
            <td contenteditable="true">${sloc}</td>
            <td contenteditable="true">${size}</td>
            <td contenteditable="true">${weight}</td>
            <td contenteditable="true">${maker}</td>
            <td contenteditable="true">${inspection}</td>
            <td style="text-align: center;"><button class="btn btn-delete" onclick="deleteRow(this)">ลบ</button></td>
        `;
        
        dataTableBody.appendChild(tr);
        barcodeInput.value = ''; 
        barcodeInput.focus();   
        updateRowCount();
    }

    function deleteRow(button) {
        if(confirm("คุณต้องการลบแถวนี้ใช่หรือไม่?")) {
            button.closest('tr').remove();
            updateRowCount();
        }
    }

    function clearAllData() {
        if(confirm("⚠️ คุณต้องการล้างข้อมูลทั้งหมดในตารางใช่หรือไม่? Data จะหายทั้งหมด!")) {
            dataTableBody.innerHTML = '';
            updateRowCount();
        }
        function updateRowCount() {const rows = dataTableBody.querySelectorAll('tr').length;document.getElementById('rowCountText').innerText = 📊 สรุปรายการ: ทั้งหมด ${rows} แถว;}function triggerAction(actionName) {alert(คุณได้กดปุ่ม: ${actionName});}function exportToExcel() {const rows = dataTableBody.querySelectorAll('tr');if(rows.length === 0) {alert("ไม่มีข้อมูลในตารางสำหรับส่งออก");return;}const data = [['Batch No', 'Sloc', 'Size', 'Weight', 'Maker', 'Inspection']];rows.forEach(row => {const cells = row.querySelectorAll('td');if(cells.length >= 6) {data.push([cells[0].innerText.trim(),cells[1].innerText.trim(),cells[2].innerText.trim(),cells[3].innerText.trim(),cells[4].innerText.trim(),cells[5].innerText.trim()]);}});const worksheet = XLSX.utils.aoa_to_sheet(data);const workbook = XLSX.utils.book_new();XLSX.utils.book_append_sheet(workbook, worksheet, "Coil Data");XLSX.writeFile(workbook, "Coil_Management_Data.xlsx");}
    }
